<div class="auth-page">
  <div class="auth-card">
    <div class="auth-card__header">
      <span class="auth-card__logo">S</span>
      <h1 class="auth-card__title">Sign in to SaaSHub</h1>
    </div>

    @if (error) {
      <div class="alert alert--error">{{ error }}</div>
    }

    <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
      <div class="field">
        <label class="field__label" for="email">Email</label>
        <input id="email" type="email" formControlName="email"
               class="field__input" placeholder="you@company.com" autocomplete="email" />
        @if (form.get('email')?.invalid && form.get('email')?.touched) {
          <span class="field__error">Enter a valid email</span>
        }
      </div>

      <div class="field">
        <label class="field__label" for="password">Password</label>
        <input id="password" type="password" formControlName="password"
               class="field__input" placeholder="••••••••" autocomplete="current-password" />
        @if (form.get('password')?.invalid && form.get('password')?.touched) {
          <span class="field__error">Password is required</span>
        }
      </div>

      <button type="submit" class="btn btn--primary btn--full" [disabled]="loading">
        {{ loading ? 'Signing in…' : 'Sign in' }}
      </button>
    </form>

    <p class="auth-card__footer">
      No account? <a routerLink="/register">Create one</a>
    </p>
  </div>
</div>
