services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: saas_dashboard
      POSTGRES_USER: saas_user
      POSTGRES_PASSWORD: saas_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - saas-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saas_user -d saas_dashboard"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@saas.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    networks:
      - saas-network
    depends_on:
      - postgres

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    networks:
      - saas-network
    depends_on:
      postgres:
        condition: service_healthy

networks:
  saas-network:
    driver: bridge

volumes:
  postgres_data:
