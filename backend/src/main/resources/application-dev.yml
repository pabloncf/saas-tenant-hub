spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/saas_dashboard
    username: saas_app
    password: saas_app_pass
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    # Explicit URL so Flyway builds its own datasource independently of the primary one.
    # Without this, FlywayAutoConfiguration copies the primary DataSource (TenantAwareDataSource)
    # and fails because that wrapper has no setUrl() method.
    url: jdbc:postgresql://localhost:5432/saas_dashboard
    user: saas_user
    password: saas_pass
    clean-on-validation-error: true

management:
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.pabloncf.saas: DEBUG
    org.flywaydb: DEBUG
